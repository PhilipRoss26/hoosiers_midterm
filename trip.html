<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Indiana Legends – Plan Your Trip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <span>Indiana Legends</span>
      </div>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="athletes.html">Athletes</a></li>
        <li><a href="artists.html">Actors/Artists</a></li>
        <li><a href="authors.html">Misc</a></li>
        <li><a href="trip.html" class="active">Plan Your Trip</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Plan Your Indiana Legends Trip</h1>
      <p>
        Share what you want to see and we will suggest stops related to Indiana’s most famous people.
      </p>
    </section>

    <section class="trip-form-section">
      <form class="trip-form" action="#" method="post">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" />

        <label for="email">Email (if you’d like a copy)</label>
        <input type="email" id="email" name="email" />

        <label for="when">When would you like to visit?</label>
        <input type="text" id="when" name="when" placeholder="Example: Fall weekend, next summer, etc." />

        <label for="focus">Who do you want to learn about?</label>
        <input type="text" id="focus" name="focus" placeholder="Athletes, actors, authors, or a mix." />

        <label for="notes">Trip notes</label>
        <textarea id="notes" name="notes" rows="4" placeholder="List cities, museums, or people you want to see."></textarea>

        <button type="submit" class="btn submit-btn">
          <i class="fa-solid fa-paper-plane"></i> Plan my ideas
        </button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; Feb 2026 Indiana Legends. All rights reserved.</p>
  </footer>

  <script>
    const hamburger = document.querySelector(".hamburger");
    const navLinks = document.querySelector(".nav-links");
    hamburger.addEventListener("click", () => {
      navLinks.classList.toggle("open");
    });
  </script>
</body>
</html>
